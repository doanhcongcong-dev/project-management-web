{% extends 'base.html' %}
{% block title %}Tắt 2FA{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4><i class="fas fa-exclamation-triangle"></i> Xác nhận tắt 2FA</h4>
                </div>
                <div class="card-body">
                    <p>Bạn có chắc chắn muốn tắt xác thực 2 yếu tố? Điều này sẽ làm giảm bảo mật tài khoản của bạn.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Tắt 2FA</button>
                        <a href="{% url 'dashboard:index' %}" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
