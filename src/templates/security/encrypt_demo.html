{% extends 'base.html' %}
{% block title %}Demo mã hóa{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4><i class="fas fa-lock"></i> Demo mã hóa dữ liệu</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Nhập văn bản cần mã hóa:</label>
                    <input type="text" name="text" class="form-control" value="{{ original_text }}" placeholder="Ví dụ: số điện thoại khách hàng">
                </div>
                <button type="submit" name="encrypt" class="btn btn-primary">Mã hóa</button>
                <hr>
                {% if encrypted_data %}
                    <div class="mb-3">
                        <label>Dữ liệu đã mã hóa:</label>
                        <input type="text" name="encrypted_text" class="form-control" value="{{ encrypted_data }}" readonly>
                    </div>
                    <button type="submit" name="decrypt" class="btn btn-warning">Giải mã</button>
                {% endif %}
                {% if decrypted_data %}
                    <div class="mt-3 alert alert-success">
                        <strong>Giải mã thành công:</strong> {{ decrypted_data }}
                    </div>
                {% endif %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
