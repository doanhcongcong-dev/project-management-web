{% extends 'base.html' %}
{% block title %}Đăng nhập{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-sign-in-alt"></i> Đăng nhập</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Mật khẩu</label>
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                </form>
                {% if form.errors %}
                    <div class="alert alert-danger mt-3">Tên đăng nhập hoặc mật khẩu không đúng.</div>
                {% endif %}
                <hr>
                <p class="text-center">Chưa có tài khoản? <a href="{% url 'users:register' %}">Đăng ký</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
