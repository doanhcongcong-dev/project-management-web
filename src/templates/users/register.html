{% extends 'base.html' %}
{% block title %}Đăng ký{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-user-plus"></i> Đăng ký</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Đăng ký</button>
                </form>
                <hr>
                <p class="text-center">Đã có tài khoản? <a href="{% url 'users:login' %}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
