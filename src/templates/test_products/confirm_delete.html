{% extends 'base.html' %}
{% load static %}

{% block title %}Xác nhận xóa{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4><i class="fas fa-exclamation-triangle"></i> Xác nhận xóa</h4>
                </div>
                <div class="card-body">
                    <p>Bạn có chắc chắn muốn xóa sản phẩm thử nghiệm <strong>"{{ product.name }} - v{{ product.version }}"</strong> không?</p>
                    <p class="text-danger"><i class="fas fa-info-circle"></i> Hành động này không thể hoàn tác!</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Xóa</button>
                        <a href="{% url 'test_products:detail' product.id %}" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
