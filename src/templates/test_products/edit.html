{% extends 'base.html' %}
{% load static %}

{% block title %}Chỉnh sửa sản phẩm thử nghiệm{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4><i class="fas fa-edit"></i> Chỉnh sửa sản phẩm thử nghiệm</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-warning"><i class="fas fa-save"></i> Cập nhật</button>
                    <a href="{% url 'test_products:detail' product.id %}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
