{% extends 'base.html' %}
{% block title %}{% if form.instance.pk %}Sửa rủi ro{% else %}Thêm rủi ro{% endif %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-{% if form.instance.pk %}warning{% else %}success{% endif %} text-white">
            <h4>{% if form.instance.pk %}Sửa rủi ro{% else %}Thêm rủi ro mới{% endif %}</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Lưu</button>
                <a href="{% if form.instance.pk %}{% url 'risks:detail' form.instance.pk %}{% else %}{% url 'risks:list' %}{% endif %}" class="btn btn-secondary">Hủy</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
