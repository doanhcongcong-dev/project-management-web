version: '3.8'

services:
  db:
    image: postgres:13
    container_name: myproject_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: myproject_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: .
    container_name: myproject_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app
      - ./src/static:/app/static
      - ./src/media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: myproject_celery
    command: celery -A config worker -l info
    volumes:
      - ./src:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # Wazuh agent (nếu bạn muốn chạy cùng, nhưng cần có Wazuh manager riêng)
  # wazuh-agent:
  #   image: wazuh/wazuh-agent:4.7.0
  #   container_name: myproject_wazuh_agent
  #   environment:
  #     - WAZUH_MANAGER=your-wazuh-manager-ip
  #     - WAZUH_AGENT_NAME=web-app
  #   volumes:
  #     - ./wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
  #   restart: unless-stopped

volumes:
  postgres_data: